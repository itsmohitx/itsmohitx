name: Deploy sites to GitHub Pages

# Builds TWO static exports into one Pages artifact:
#   the-mind/  -> site root      (the original, unchanged, stays live as-is)
#   mindx/     -> /v2 subpath    (the new MohitX evolution, preview)
# One-time setup (already done): Settings, Pages, Source -> GitHub Actions.

on:
  push:
    branches: ["main", "master", "claude/new-session-rensu1"]
    paths:
      - "the-mind/**"
      - "mindx/**"
      - ".github/workflows/deploy-the-mind.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build the original (root)
        working-directory: the-mind
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          npm ci
          npm run build

      - name: Build MohitX (v2 preview)
        working-directory: mindx
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}/v2
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}/v2
        run: |
          npm install
          npm run build

      - name: Merge artifacts
        run: |
          mkdir -p _site
          cp -r the-mind/out/. _site/
          mkdir -p _site/v2
          cp -r mindx/out/. _site/v2/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
