name: Deploy sites to GitHub Pages

# Builds THREE static exports into one Pages artifact:
#   the-mind/  -> site root   (the original, unchanged)
#   mindx/     -> /v2         (the v2 snapshot, source frozen, tag v2-snapshot)
#   mindx21/   -> /v2-1       (the v2.1 cleanup pass)
# The root 404.html gets a small injected script so misses under /v2 and /v2-1
# land on THEIR OWN 404 pages instead of leaking the old design.

on:
  push:
    branches: ["main", "master", "claude/new-session-rensu1"]
    paths:
      - "the-mind/**"
      - "mindx/**"
      - "mindx21/**"
      - ".github/workflows/deploy-the-mind.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build the original (root)
        working-directory: the-mind
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          npm ci
          npm run build

      - name: Build v2 snapshot
        working-directory: mindx
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}/v2
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}/v2
        run: |
          npm install
          npm run build

      - name: Build v2.1
        working-directory: mindx21
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}/v2-1
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}/v2-1
        run: |
          npm install
          npm run build

      - name: Merge artifacts and route sub-site 404s
        run: |
          mkdir -p _site
          cp -r the-mind/out/. _site/
          mkdir -p _site/v2 _site/v2-1
          cp -r mindx/out/. _site/v2/
          cp -r mindx21/out/. _site/v2-1/
          touch _site/.nojekyll
          # Pages serves ONE root 404.html; send /v2-1 and /v2 misses to their own 404s.
          sed -i 's#</head>#<script>(function(){var p=location.pathname;var m=p.match(/^(.*?\/(?:v2-1|v2))(\/|$)/);if(m){var b=m[1];location.replace(b+(b.slice(-4)==="v2-1"?"/404":"/404.html")+location.search);}})();</script></head>#' _site/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
