name: Deploy sites to GitHub Pages

# Builds THREE static exports into one Pages artifact:
#   the-mind/  -> site root   (the original, unchanged)
#   mindx/     -> /v2         (the v2 snapshot, source frozen, tag v2-snapshot)
#   mindx21/   -> /v2-1       (the v2.1 cleanup pass)
# The whole domain shares one root 404.html on Pages; it is replaced with the
# v2.1 404 page so no miss anywhere can leak the old design.

on:
  push:
    branches: ["main", "master", "claude/new-session-rensu1"]
    paths:
      - "the-mind/**"
      - "mindx/**"
      - "mindx21/**"
      - ".github/workflows/deploy-the-mind.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build the original (root)
        working-directory: the-mind
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          npm ci
          npm run build

      - name: Build v2 snapshot
        working-directory: mindx
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}/v2
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}/v2
        run: |
          npm install
          npm run build

      - name: Build v2.1
        working-directory: mindx21
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}/v2-1
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}/v2-1
        run: |
          npm install
          npm run build

      - name: Merge artifacts and route sub-site 404s
        run: |
          mkdir -p _site
          cp -r the-mind/out/. _site/
          mkdir -p _site/v2 _site/v2-1
          cp -r mindx/out/. _site/v2/
          cp -r mindx21/out/. _site/v2-1/
          # Pages serves ONE root 404.html for the whole domain. Use the v2.1
          # 404 for every miss; its asset and link URLs are absolute, so it
          # renders correctly from any path.
          cp mindx21/out/404.html _site/404.html
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
